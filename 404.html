<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — agentlens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--text:#c9d1d9;--dim:#8b949e;
  --blue:#58a6ff;--green:#3fb950;--purple:#d2a8ff;
  --border:#30363d;--heading:#ffffff;--hdr-bg:rgba(13,17,23,.92);
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:2rem;text-align:center}
.code{font-family:'Courier New',monospace;font-size:5rem;font-weight:bold;color:var(--blue);opacity:.25;line-height:1;margin-bottom:1.5rem}
h1{font-size:1.5rem;font-weight:400;color:var(--heading);margin-bottom:.75rem}
p{color:var(--dim);font-size:.95rem;margin-bottom:.4rem}
.redirect{font-family:'Courier New',monospace;font-size:.85rem;color:var(--dim);margin:1.5rem 0 2rem}
.redirect span{color:var(--blue)}
.cards{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem}
.card{padding:1.25rem 1.5rem;border-radius:10px;text-decoration:none;text-align:left;min-width:220px;max-width:260px;transition:transform .2s,background .2s}
.card-blue{border:1px solid var(--blue);background:rgba(88,166,255,.05)}
.card-blue:hover{background:rgba(88,166,255,.10);transform:translateY(-2px)}
.card-purple{border:1px solid var(--purple);background:rgba(210,168,255,.05)}
.card-purple:hover{background:rgba(210,168,255,.10);transform:translateY(-2px)}
.card-eye{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;font-family:'Courier New',monospace;color:var(--dim);margin-bottom:.4rem}
.card-title{font-size:1rem;color:var(--heading);margin-bottom:.4rem}
.card-badge{font-size:.68rem;font-family:'Courier New',monospace;color:var(--dim)}
.hub{font-size:.82rem;color:var(--dim)}
.hub a{color:var(--blue);text-decoration:none}
.hub a:hover{text-decoration:underline}
@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#ffffff;--text:#24292f;--dim:#57606a;--blue:#0969da;--purple:#8250df;--border:#d0d7de;--heading:#1c2128;
  }
}
[data-theme="light"]{--bg:#ffffff;--text:#24292f;--dim:#57606a;--blue:#0969da;--purple:#8250df;--border:#d0d7de;--heading:#1c2128;}
[data-theme="dark"]{--bg:#0d1117;--text:#c9d1d9;--dim:#8b949e;--blue:#58a6ff;--purple:#d2a8ff;--border:#30363d;--heading:#ffffff;}
</style>
</head>
<body>
<div class="code">404</div>
<h1>Page not found</h1>
<p>This URL doesn't exist — it may have moved when we restructured the site.</p>
<p class="redirect">Redirecting to hub in <span id="count">5</span>s…</p>
<div class="cards">
  <a class="card card-blue" href="./orchestration/">
    <div class="card-eye">Guide 01</div>
    <div class="card-title">Orchestration Patterns</div>
    <div class="card-badge">19 concepts · 10 patterns</div>
  </a>
  <a class="card card-purple" href="./engineering/">
    <div class="card-eye">Guide 02</div>
    <div class="card-title">Agent Engineering</div>
    <div class="card-badge">16 concepts · 5 phases</div>
  </a>
</div>
<p class="hub">or go to <a href="./">agentlens home →</a></p>

<script>
(function(){
  const saved=localStorage.getItem('theme');
  if(saved)document.documentElement.setAttribute('data-theme',saved);
})();
let n=5;
const el=document.getElementById('count');
const id=setInterval(()=>{
  n--;
  el.textContent=n;
  if(n<=0){clearInterval(id);window.location.href='./';}
},1000);
</script>
</body>
</html>
